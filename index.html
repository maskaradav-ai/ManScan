<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManScan</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #0e0e0e;
    color: white;
}

/* HEADER */
header {
    background: #151515;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #00ff88;
}

.menu a {
    color: #ccc;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
}

.menu a:hover {
    color: #00ff88;
}

/* BANNER */
.banner {
    background: linear-gradient(to right, #111, #1f1f1f);
    padding: 50px;
    text-align: center;
    font-size: 20px;
}

/* SECTION */
.section-title {
    padding: 25px 30px 10px;
    font-size: 18px;
    color: #00ff88;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    padding: 0 30px 40px;
}

.card {
    background: #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    font-size: 14px;
    text-align: center;
}

/* FOOTER */
footer {
    background: #151515;
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: #777;
}
</style>
</head>

<body>

<header>
    <div class="logo">MeuScan</div>
    <div class="menu">
        <a href="#">Início</a>
        <a href="#">Mangás</a>
        <a href="#">Mais Lidos</a>
        <a href="#">Novos</a>
    </div>
</header>

<div class="banner">
    🔥 Bem-vindo ao MeuScan
</div>

<h2 class="section-title">Mangás Populares</h2>

<div class="grid">

    <div class="card">
        <img src="https://via.placeholder.com/160x230">
        <p>Mangá 1</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/160x230">
        <p>Mangá 2</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/160x230">
        <p>Mangá 3</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/160x230">
        <p>Mangá 4</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/160x230">
        <p>Mangá 5</p>
    </div>

</div>

<footer>
    © 2026 ManScan - Site estático de exemplo
</footer>

</body>
</html>
