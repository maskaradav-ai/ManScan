tá<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeuScan - Início</title>
<style>
body {margin:0;font-family:Arial;background:#0e0e0e;color:white}
header{background:#151515;padding:15px 30px;display:flex;justify-content:space-between}
.logo{color:#00ff88;font-weight:bold}
nav a{color:#ccc;text-decoration:none;margin-left:20px}
nav a:hover{color:#00ff88}
.section{padding:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px}
.card{background:#1a1a1a;border-radius:8px;overflow:hidden}
.card img{width:100%;height:220px;object-fit:cover}
.card p{text-align:center;padding:10px}
footer{background:#151515;text-align:center;padding:15px;color:#777}

.personagem {
    position: fixed;
    bottom: 20px;
    left: -150px;
    width: 120px;
    pointer-events: none;
    animation: andar 30s linear infinite,
               flutuar 3s ease-in-out infinite alternate,
               respirar 2s ease-in-out infinite;
}

/* Movimento de ida e volta */
@keyframes andar {
    0% {
        left: -150px;
        transform: scaleX(1);
    }
    45% {
        left: 100%;
        transform: scaleX(1);
    }
    50% {
        left: 100%;
        transform: scaleX(-1); /* vira */
    }
    95% {
        left: -150px;
        transform: scaleX(-1);
    }
    100% {
        left: -150px;
        transform: scaleX(1);
    }
}

/* Flutuar */
@keyframes flutuar {
    from { transform: translateY(0px); }
    to { transform: translateY(-12px); }
}

/* Respirar */
@keyframes respirar {
    0% { scale: 1; }
    50% { scale: 1.03; }
    100% { scale: 1; }
}
  
</style>
</head>
<body>

<header>
<div class="logo">MeuScan</div>
<nav>
<a href="index.html">Início</a>
<a href="mangas.html">Mangás</a>
<a href="mais-lidos.html">Mais Lidos</a>
<a href="novos.html">Novos</a>
</nav>
</header>

<div class="section">
<h2>🔥 Destaques</h2>
<div class="grid">
<div class="card"><img src="https://via.placeholder.com/150x220"><p>Mangá 1</p></div>
<div class="card"><img src="https://via.placeholder.com/150x220"><p>Mangá 2</p></div>
</div>
</div>

<footer>© 2026 MeuScan</footer>

<img src="kaguyakawai.png" class="personagem">
  
</body>
</html>
