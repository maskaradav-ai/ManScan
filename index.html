<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManScan</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: #fff;
}

header {
    background: #1a1a1a;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #00ff88;
}

.search-box input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: 200px;
}

nav {
    background: #181818;
    padding: 10px 30px;
}

nav a {
    color: #ccc;
    text-decoration: none;
    margin-right: 20px;
    font-size: 14px;
}

nav a:hover {
    color: #00ff88;
}

.banner {
    background: linear-gradient(to right, #111, #222);
    padding: 40px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.section-title {
    padding: 20px 30px 10px;
    font-size: 18px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
    padding: 0 30px 30px;
}

.card {
    background: #1c1c1c;
    border-radius: 8px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    font-size: 14px;
}

footer {
    background: #1a1a1a;
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: #777;
}
</style>
</head>

<body>

<header>
    <div class="logo">MeuScan</div>
    <div class="search-box">
        <input type="text" placeholder="Pesquisar mangá...">
    </div>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Mangás</a>
    <a href="#">Mais Lidos</a>
    <a href="#">Novos</a>
</nav>

<div class="banner">
    🔥 Destaque da Semana
</div>

<h2 class="section-title">Atualizações Recentes</h2>

<div class="grid">
    <div class="card">
        <img src="https://via.placeholder.com/150x220">
        <p>Nome do Mangá</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150x220">
        <p>Outro Mangá</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150x220">
        <p>Mais Um</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150x220">
        <p>Título Aqui</p>
    </div>
</div>

<footer>
    © 2026 MeuScan - Site de exemplo
</footer>

</body>
</html>
